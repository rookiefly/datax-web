version: '3.7'
services:
  mysql:
    image: mysql:5.7
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: root
      MYSQL_DATABASE: datax_web
      TZ: Asia/Shanghai
      character-set-server: utf8mb4
      collation-server: utf8mb4_unicode_ci
    ports:
      - 3308:3306
    volumes:
      - ./mysql/data:/var/lib/mysql
      - ./mysql/conf:/etc/mysql/conf.d
      - ./mysql/logs:/logs
      - ./mysql/db:/docker-entrypoint-initdb.d/
    container_name: dataxWebMysql
    networks:
      - datax-network

  datax-admin:
    image: rookiefly/datax-admin-alpine:2.1.2
    restart: always
    ports:
      - 9527:9527
    environment:
      SERVER_PORT: 9527
      DB_USERNAME: root
      DB_PASSWORD: root
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: datax_web
      MAIL_USERNAME: email_name
      MAIL_PASSWORD: email_password
    depends_on:
      - mysql
    container_name: dataxWebAdmin
    networks:
      - datax-network

  datax-executor:
    image: rookiefly/datax-executor-alpine:2.1.2
    restart: always
    volumes:
      - ./datax_web/executor/python:/opt/datax-executor/python
      - ./datax_web/executor/json:/opt/datax-executor/json
      - ./datax_web/executor/data:/opt/datax-executor/data
    ports:
      - 8081:8081
    environment:
      SERVER_PORT: 8081
      DATAX_ADMIN_HOST: datax-admin
      DATAX_ADMIN_PORT: 9527
      EXECUTOR_PORT: 9999
      PYTHON_PATH: /opt/datax/bin/datax.py
    #此处检测 dataxWebAdmin是否成功启动，如果将container_name和container_name.SERVER_PORT改变，请将下面的命令做响应该改变
    entrypoint: "/etc/init.d/wait-for-it.sh datax-admin:9527 --  java com.wugui.datax.executor.DataXExecutorApplication"
    depends_on:
      - mysql
      - datax-admin
    container_name: dataxWebExecutor
    networks:
      - datax-network

networks:
  datax-network:
    driver: bridge